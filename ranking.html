<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitSocial - Ranking</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #fff;
      max-width: 480px;
      margin: 0 auto;
      padding-bottom: 80px;
    }

    .header {
      position: sticky;
      top: 0;
      background: #0a0a0a;
      border-bottom: 1px solid #1a1a1a;
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 100;
    }

    .header-logo { font-size: 1.4rem; font-weight: 900; color: #00ff88; }

    .header-titulo { font-size: 1rem; font-weight: 700; color: #fff; }

    /* PODIO */
    .podio {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 12px;
      padding: 30px 16px 20px;
      background: linear-gradient(180deg, #0a0a0a, #1a1a1a);
    }

    .podio-lugar {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .podio-avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 1.1rem;
      color: #000;
    }

    .podio-lugar:nth-child(1) .podio-avatar { background: #C0C0C0; width: 48px; height: 48px; }
    .podio-lugar:nth-child(2) .podio-avatar { background: #FFD700; width: 64px; height: 64px; }
    .podio-lugar:nth-child(3) .podio-avatar { background: #CD7F32; width: 48px; height: 48px; }

    .podio-nombre { font-size: 0.75rem; font-weight: 700; text-align: center; }
    .podio-pts { font-size: 0.7rem; color: #00ff88; font-weight: 700; }

    .podio-base {
      border-radius: 8px 8px 0 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      font-weight: 900;
      color: #000;
    }

    .podio-lugar:nth-child(1) .podio-base { background: #C0C0C0; width: 70px; height: 50px; }
    .podio-lugar:nth-child(2) .podio-base { background: #FFD700; width: 80px; height: 70px; }
    .podio-lugar:nth-child(3) .podio-base { background: #CD7F32; width: 70px; height: 40px; }

    /* REINICIO */
    .reinicio-banner {
      margin: 0 12px 16px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .reinicio-texto { font-size: 0.8rem; color: #888; }
    .reinicio-tiempo { font-size: 1rem; font-weight: 700; color: #ff6b6b; }

    /* LISTA */
    .lista-titulo {
      padding: 0 16px 12px;
      font-size: 0.75rem;
      color: #888;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .ranking-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid #1a1a1a;
      transition: background 0.2s;
    }

    .ranking-item:hover { background: #1a1a1a; }

    .ranking-item.yo { background: #00ff8810; border-left: 3px solid #00ff88; }

    .posicion {
      font-size: 0.9rem;
      font-weight: 700;
      color: #888;
      width: 24px;
      text-align: center;
      flex-shrink: 0;
    }

    .posicion.top3 { color: #FFD700; font-size: 1.1rem; }

    .ranking-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, #00ff88, #00aa55);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.9rem;
      color: #000;
      flex-shrink: 0;
    }

    .ranking-info { flex: 1; }
    .ranking-nombre { font-size: 0.9rem; font-weight: 700; }
    .ranking-nivel { font-size: 0.75rem; color: #888; }

    .ranking-puntos {
      font-size: 0.95rem;
      font-weight: 700;
      color: #00ff88;
    }

    .cargando {
      text-align: center;
      padding: 40px;
      color: #888;
    }

    /* NAVBAR */
    .navbar {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      background: #111;
      border-top: 1px solid #2a2a2a;
      display: flex;
      justify-content: space-around;
      padding: 10px 0 16px;
      z-index: 100;
    }

    .nav-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      background: none;
      border: none;
      color: #888;
      font-size: 0.65rem;
      cursor: pointer;
    }

    .nav-btn.active { color: #00ff88; }
    .nav-btn span:first-child { font-size: 1.4rem; }
  </style>
</head>
