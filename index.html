<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitSocial</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .logo {
      font-size: 2.5rem;
      font-weight: 900;
      color: #00ff88;
      margin-bottom: 8px;
      letter-spacing: -1px;
    }

    .tagline {
      color: #888;
      font-size: 0.9rem;
      margin-bottom: 40px;
      text-align: center;
    }

    .card {
      background: #1a1a1a;
      border-radius: 20px;
      padding: 30px 25px;
      width: 100%;
      max-width: 400px;
      border: 1px solid #2a2a2a;
    }

    .tabs {
      display: flex;
      margin-bottom: 25px;
      background: #0a0a0a;
      border-radius: 10px;
      padding: 4px;
    }

    .tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      color: #888;
      transition: all 0.3s;
      border: none;
      background: transparent;
    }

    .tab.active {
      background: #00ff88;
      color: #000;
      font-weight: 700;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 6px;
    }

    input, select {
      width: 100%;
      padding: 14px;
      background: #0a0a0a;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      color: #fff;
      font-size: 0.95rem;
      outline: none;
      transition: border 0.3s;
    }

    input:focus, select:focus {
      border-color: #00ff88;
    }

    select option {
      background: #1a1a1a;
    }

    .btn {
      width: 100%;
      padding: 15px;
      background: #00ff88;
      color: #000;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.3s;
    }

    .btn:hover { opacity: 0.85; }

    .mensaje {
      margin-top: 15px;
      padding: 12px;
      border-radius: 10px;
      font-size: 0.85rem;
      text-align: center;
      display: none;
    }

    .mensaje.error { background: #ff444420; color: #ff6b6b; border: 1px solid #ff444440; }
    .mensaje.exito { background: #00ff8820; color: #00ff88; border: 1px solid #00ff8840; }

    .form-section { display: none; }
    .form-section.active { display: block; }
  </style>
</head>
<body>

  <div class="logo">⚡ FitSocial</div>
  <p class="tagline">Entrena. Compite. Inspira.</p>

  <div class="card">
    <div class="tabs">
      <button class="tab active" onclick="cambiarTab('login', this)">Iniciar Sesión</button>
      <button class="tab" onclick="cambiarTab('registro', this)">Registrarse</button>
    </div>

    <!-- LOGIN -->
    <div class="form-section active" id="login">
      <div class="form-group">
        <label>Correo electrónico</label>
        <input type="email" id="login-correo" placeholder="tu@correo.com">
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="login-pass" placeholder="••••••••">
      </div>
      <button class="btn" onclick="iniciarSesion()">Entrar 🚀</button>
    </div>

    <!-- REGISTRO -->
    <div class="form-section" id="registro">
      <div class="form-group">
        <label>Nombre / Alias</label>
        <input type="text" id="reg-nombre" placeholder="¿Cómo te llaman?">
      </div>
      <div class="form-group">
        <label>Correo electrónico</label>
        <input type="email" id="reg-correo" placeholder="tu@correo.com">
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="reg-pass" placeholder="Mínimo 6 caracteres">
      </div>
      <div class="form-group">
        <label>¿Cómo vas a usar FitSocial?</label>
        <select id="reg-rol">
          <option value="usuario">💪 Usuario Común — Motivarme gratis</option>
          <option value="profesional">⭐ Personal Trainer / Profesional</option>
        </select>
      </div>
      <button class="btn" onclick="registrarse()">Crear mi cuenta 🎯</button>
    </div>

    <div class="mensaje" id="mensaje"></div>
  </div>

  <script>
    const SUPABASE_URL = 'https://owvnjaxuubzqpnmzhvkw.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im93dm5qYXh1dWJ6cXBubXpodmt3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4MTAxNzMsImV4cCI6MjA5NzM4NjE3M30.xfqu93vx2N3Md0aH_yKvMZw-F17Fibzk8Dg1J4l_oM8';

    function cambiarTab(tab, el) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.form-section').forEach(f => f.classList.remove('active'));
      document.getElementById(tab).classList.add('active');
      el.classList.add('active');
      ocultarMensaje();
    }

    function mostrarMensaje(texto, tipo) {
      const el = document.getElementById('mensaje');
      el.textContent = texto;
      el.className = 'mensaje ' + tipo;
      el.style.display = 'block';
    }

    function ocultarMensaje() {
      document.getElementById('mensaje').style.display = 'none';
    }

    async function registrarse() {
      const nombre = document.getElementById('reg-nombre').value.trim();
      const correo = document.getElementById('reg-correo').value.trim();
      const pass = document.getElementById('reg-pass').value;
      const rol = document.getElementById('reg-rol').value;

      if (!nombre || !correo || !pass) {
        mostrarMensaje('Por favor completá todos los campos.', 'error');
        return;
      }

      if (pass.length < 6) {
        mostrarMensaje('La contraseña debe tener al menos 6 caracteres.', 'error');
        return;
      }

      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/usuarios`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`,
            'Prefer': 'return=minimal'
          },
          body: JSON.stringify({ nombre, correo, contrasena: pass, rol })
        });

        if (res.ok) {
          mostrarMensaje('¡Cuenta creada con éxito! 🎉 Ya podés iniciar sesión.', 'exito');
        } else {
          const err = await res.json();
          if (err.message && err.message.includes('duplicate')) {
            mostrarMensaje('Ese correo ya está registrado.', 'error');
          } else {
            mostrarMensaje('Error: ' + (err.message || 'Intentá de nuevo.'), 'error');
          }
        }
      } catch (e) {
        mostrarMensaje('Error de conexión. Verificá tu internet.', 'error');
      }
    }

    async function iniciarSesion() {
      const correo = document.getElementById('login-correo').value.trim();
      const pass = document.getElementById('login-pass').value;

      if (!correo || !pass) {
        mostrarMensaje('Completá tu correo y contraseña.', 'error');
        return;
      }

      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/usuarios?correo=eq.${encodeURIComponent(correo)}&contrasena=eq.${encodeURIComponent(pass)}&select=*`, {
          headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`
          }
        });

        const data = await res.json();

        if (data.length > 0) {
          localStorage.setItem('usuario', JSON.stringify(data[0]));
          mostrarMensaje('¡Bienvenido ' + data[0].nombre + '! 💪', 'exito');
          setTimeout(() => {
            window.location.href = 'feed.html';
          }, 1500);
        } else {
          mostrarMensaje('Correo o contraseña incorrectos.', 'error');
        }
      } catch (e) {
        mostrarMensaje('Error de conexión. Verificá tu internet.', 'error');
      }
    }
  </script>

</body>
</html>
